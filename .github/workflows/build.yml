name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEREUS_PULSAR_CHECKOUT: ${{ github.workspace }}/.ci/pulsar
    steps:
      - uses: actions/checkout@v4
      - name: Check out locked Pulsar source API baseline
        uses: actions/checkout@v4
        with:
          repository: nereusstream/pulsar
          ref: 100d3ef0ff7c7da36d497453b141ddff6f34a9d3
          path: .ci/pulsar
          fetch-depth: 1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Verify Pulsar source API baseline
        run: bash scripts/check-pulsar-source-lock.sh "$NEREUS_PULSAR_CHECKOUT" 100d3ef0ff7c7da36d497453b141ddff6f34a9d3
      - name: Check scaffold
        run: ./gradlew checkPhase0
      - name: Build
        run: ./gradlew build
