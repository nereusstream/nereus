# Oxia 0.9.0 records a nullable leader hint in a debug event while a write
# stream is recovering. Keep dependency debug events disabled so a normal
# retry cannot be replaced by reload4j's null-MDC failure.
log4j.rootLogger=WARN, stderr
log4j.appender.stderr=org.apache.log4j.ConsoleAppender
log4j.appender.stderr.Target=System.err
log4j.appender.stderr.layout=org.apache.log4j.PatternLayout
log4j.appender.stderr.layout.ConversionPattern=%d{ISO8601} %-5p [%t] %c - %m%n
